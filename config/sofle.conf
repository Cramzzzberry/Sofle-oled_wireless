# CKey noise reduction configuration
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# Encoder configuration
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Cấu hình công suất phát BLE
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Fixing battery reporting errors on Windows
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# OLED screen configuration
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Power management configuration
CONFIG_ZMK_IDLE_TIMEOUT=240000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000

#  Wake-up configuration
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_USB=y

# ZMK Studio Configuration
CONFIG_ZMK_STUDIO_LOCKING=n
# Intel support
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# RGB backlight configuration
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=30
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Automatically turn off RGB when idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Improve BLE connection stability.
CONFIG_BT_BUF_ACL_RX_SIZE=512
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Do not delete bond on startup
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# Upgrade behavior queue limit
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# Enable mouse emulation
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
